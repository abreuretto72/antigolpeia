workflows:
  ios-testflight:
    name: iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.multiversodigital.antigolpeia

      # ── Variáveis de ambiente ────────────────────────────────────────────────
      # Configure todas em: Codemagic → seu app → Environment variables
      vars:
        BUNDLE_ID: com.multiversodigital.antigolpeia
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        # Credenciais do app (usadas para gerar o .env no build)
        SUPABASE_URL: $SUPABASE_URL
        SUPABASE_ANON_KEY: $SUPABASE_ANON_KEY
        REVENUE_API_KEY: $REVENUE_API_KEY

    triggering:
      events:
        - push
      branch_pattern:
        pattern: master
        include: true

    scripts:
      - name: Gerar arquivo .env
        script: |
          cat > .env << EOF
          EXPO_PUBLIC_SUPABASE_URL=$SUPABASE_URL
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          REVENUE_API_KEY=$REVENUE_API_KEY
          EOF

      - name: Instalar dependências Flutter
        script: flutter pub get

      - name: Instalar pods iOS
        script: |
          cd ios && pod install && cd ..

      - name: Gerar Export Options
        script: |
          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>bundleID</key>
            <string>com.multiversodigital.antigolpeia</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS (release)
        script: |
          flutter build ipa \
            --export-options-plist=/Users/builder/export_options.plist

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Testadores Internos

      email:
        recipients:
          - contato@multiversodigital.com.br
        notify:
          success: true
          failure: true

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
